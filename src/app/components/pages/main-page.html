<main class="flex flex-col gap-6 p-6 pl-16 pr-16 justify-center">
  <form-modal class="max-w-200">

    <h4 form-header>Добавление новой записи</h4>

    <div form-content>
      <p>Введите текст</p>
      <textarea name="text" [(ngModel)]="post_add_data.text"></textarea>
    </div>
    <div form-content class="flex justify-between items-end">
      <form-file-input form-content></form-file-input>
      <button (click)="savePost()">Добавить</button>
    </div>

  </form-modal>

  <button (click)="getPosts()">Получить посты</button>

  @for (item of posts; track $index) {
    <form-modal class="max-w-200">
  
      <div form-header class="flex items-center gap-2">
        <div class="rounded-[50px] overflow-hidden">
          <img src="assets/images/default_avatar.jpg">
        </div>
        <div class="d-flex direction-column">
          <p>{{item.author}}</p>
          <h5>{{item.created}}</h5>
        </div>
      </div>
  
      <div form-content class="flex flex-col gap-2">
        <p>{{item.text}}</p>
        <img src="{{item.file_path}}">
      </div>
  
    </form-modal>
  }
</main>
