<div class="flex flex-col gap-1">

    <div class="flex justify-between items-center">
        <p class="text-writing">{{ label }}</p>

        @if (labelIcon === 'refresh') {
            <img src="assets/icons/refresh.svg" class="h-4 cursor-pointer">
        }

        @if (labelIcon === 'eye') {
            <img src="assets/icons/eye.svg" class="h-4 cursor-pointer">
        }
    </div>

    <div class="flex flex-col">

        <div class="input-wrapper flex items-center gap-2 p-2 pl-3 pr-3 rounded-[4px] outline">

            @if (leftIcon === 'email') {
                <img src="assets/icons/email.svg" class="h-4">
            }

            @if (!multiline) {

                <input
                    #inp="ngModel"
                    [(ngModel)]="model"
                    /* (ngModelChange)="model.set($event)" */
                    [type]="type"
                    [placeholder]="placeholder"
                    [required]="required"
                    [maxLength]="maxLength || 16"
                    [pattern]="pattern"
                    class="w-full">

            } @else {

                <textarea
                    #inp="ngModel"
                    [(ngModel)]="model"
                    /* (ngModelChange)="model.set($event)" */
                    [rows]="rows"
                    [required]="required"
                    [maxLength]="maxLength  || 16"
                    [placeholder]="placeholder"
                    class="w-full resize-none outline-none">
                </textarea>

            }

            @if (rightIcon === 'clear') {
                <img
                    src="assets/icons/close.svg"
                    class="h-4 cursor-pointer"
                    (click)="clear()">
            }

        </div>

        <form-input-errors [errors]="inp?.errors ?? null" [patternErrorText]="patternErrorText"></form-input-errors>

    </div>

</div>
