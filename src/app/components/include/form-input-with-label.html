<div class="flex flex-col gap-1">

    <div class="flex justify-between items-center">
        <p class="text-writing">{{ label }}</p>

        @if (labelIcon === 'refresh') {
            <img src="assets/icons/refresh.svg" class="h-4 cursor-pointer">
        }

        @if (labelIcon === 'eye') {
            <img src="assets/icons/eye.svg" class="h-4 cursor-pointer">
        }
    </div>

    <div class="flex flex-col">

        <div class="input-wrapper flex items-center gap-2 p-2 pl-3 pr-3 rounded-[4px] outline">

            @if (leftIcon === 'email') {
                <img src="assets/icons/email.svg" class="h-4">
            }

            <form-input 
                #inp="ngModel"
                [(ngModel)]="model"
                [multiline]="multiline"
                [rows]="rows"
                [type]="type"
                [placeholder]="placeholder"
                [required]="required"
                [maxLength]="maxLength || 16"
                [pattern]="pattern"
            ></form-input>

            @if (rightIcon === 'clear') {
                <img
                    src="assets/icons/close.svg"
                    class="h-4 cursor-pointer"
                    (click)="clear()">
            }

        </div>

        <!-- <div class="flex justify-between">
            @for (error of inp.errors; track error.key) {
                <h5 class="text-error">{{ error.key }}</h5>
            }
        </div> -->

    </div>

</div>
