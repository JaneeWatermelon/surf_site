@if (showErrors) {
    <div class="flex flex-col">
        @for (error of errors | keyvalue; track error.key) {
            @if (error.key == 'pattern') {
                <h5 class="text-error">
                    {{ patternErrorText || getErrorMessage(error.key, error.value) }}
                </h5>
            } @else {
                <h5 class="text-error">
                    {{ getErrorMessage(error.key, error.value) }}
                </h5>
            }
        }
        @for (error of serverErrors; track $index) {
            <h5 class="text-error">
                {{ error }}
            </h5>
        }
    </div>
}
